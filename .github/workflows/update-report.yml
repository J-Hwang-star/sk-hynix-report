name: Update SK Hynix Report

on:
  schedule:
    # 매일 한국시간(KST) 09:00 = UTC 00:00
    - cron: "0 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v5
        with:
          ref: master

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --no-cache-dir pandas

      - name: Generate report
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python sk_hynix_report.py --months 3

      - name: Verify index.html exists
        run: |
          if [ ! -f index.html ]; then
            echo "index.html not generated" && exit 1
          fi
          echo "index.html size: $(wc -c < index.html) bytes"

      - name: Commit index.html to master
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update report (${{ github.run_id }})"
          file_pattern: "index.html"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
